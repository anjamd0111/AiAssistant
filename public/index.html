<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✦ 𝙰𝙽𝙹𝙰𝙽 ʬ 合 — Indian Voice AI 🇮🇳</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#0a0a0a,#1a1a2e);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',sans-serif;padding:20px}
        .container{width:100%;max-width:500px;background:rgba(20,20,20,0.9);backdrop-filter:blur(20px);border-radius:28px;padding:30px;box-shadow:0 30px 60px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.1)}
        .brand{text-align:center;font-size:20px;font-weight:700;color:#fff;margin-bottom:5px;text-shadow:0 0 30px rgba(255,107,157,0.5)}
        .sub{text-align:center;font-size:11px;color:#666;margin-bottom:20px;letter-spacing:2px}
        .chat-box{height:350px;overflow-y:auto;padding:10px;background:rgba(0,0,0,0.3);border-radius:14px;margin-bottom:15px;display:flex;flex-direction:column;gap:8px}
        .msg{padding:10px 14px;border-radius:16px;max-width:85%;font-size:14px;line-height:1.5;word-wrap:break-word}
        .msg.user{align-self:flex-end;background:linear-gradient(135deg,#ff6b9d,#c44dff);color:#fff}
        .msg.bot{align-self:flex-start;background:rgba(255,255,255,0.08);color:#eee}
        .input-row{display:flex;gap:10px;flex-wrap:wrap}
        .input-row select,.input-row input{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:10px;color:#fff;padding:10px;outline:none}
        .input-row input{flex:1}
        .input-row button{background:linear-gradient(135deg,#ff6b9d,#c44dff);border:none;border-radius:10px;color:#fff;padding:12px 20px;cursor:pointer;font-weight:600}
        .audio-player{margin-top:10px;display:none}
        .typing{color:#888;font-size:12px;padding:5px}
    </style>
</head>
<body>
<div class="container">
    <div class="brand">✦ 𝙰𝙽𝙹𝙰𝙽 ʬ 合</div>
    <div class="sub">🇮🇳 INDIAN FEMALE VOICE AI — with BG Music</div>
    <div class="chat-box" id="chatBox">
        <div class="msg bot">नमस्ते! मैं आन्जान, आपकी Indian voice assistant। बताइए कैसे help करूं? 🫶</div>
    </div>
    <div class="typing" id="typing"></div>
    <div class="input-row">
        <select id="moodSelect">
            <option value="friendly">🫶 Friendly</option><option value="romantic">💕 Romantic</option><option value="happy">😄 Happy</option>
            <option value="sad">😢 Sad</option><option value="angry">😤 Angry</option><option value="professional">👔 Professional</option>
            <option value="emotional">🥺 Emotional</option><option value="sarcastic">😏 Sarcastic</option>
        </select>
        <input type="text" id="msgInput" placeholder="कुछ लिखो...">
        <button onclick="sendMessage()">📤</button>
    </div>
    <audio id="voiceAudio" class="audio-player" controls></audio>
    <audio id="musicAudio" class="audio-player" loop></audio>
</div>
<script>
const API = window.location.origin;
async function sendMessage(){
    const input=document.getElementById('msgInput');
    const msg=input.value.trim();
    if(!msg) return;
    addMessage(msg,'user');
    input.value='';
    document.getElementById('typing').textContent='🔄 सोच रही हूं...';
    try{
        const res=await fetch(API+'/api/full-chat',{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify({message:msg,language:'hi',mood:document.getElementById('moodSelect').value,userName:'दोस्त'})
        });
        const data=await res.json();
        document.getElementById('typing').textContent='';
        addMessage(data.reply,'bot');
        const v=document.getElementById('voiceAudio');
        const m=document.getElementById('musicAudio');
        v.src=data.voice.url; v.volume=data.player.voiceVolume; v.style.display='block';
        m.src=data.music.url; m.volume=data.player.musicVolume; m.style.display='block';
        v.play();
        m.play();
        v.onended=()=>{ setTimeout(()=>{ m.pause(); },2000); };
    }catch(e){
        document.getElementById('typing').textContent='❌ Error';
    }
}
function addMessage(text,sender){
    const box=document.getElementById('chatBox');
    const div=document.createElement('div');
    div.className='msg '+sender; div.textContent=text;
    box.appendChild(div); box.scrollTop=box.scrollHeight;
}
document.getElementById('msgInput').addEventListener('keydown',e=>{ if(e.key==='Enter') sendMessage(); });
</script>
</body>
</html>
